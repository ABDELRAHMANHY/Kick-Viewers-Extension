<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إعدادات Kick Viewers</title>
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: 'Inter', Arial, sans-serif;
      background-color: #0b0e14;
      color: white;
      margin: 0;
    }
    h3 {
      margin: 0 0 14px 0;
      color: #53fc18;
      font-size: 16px;
      text-align: center;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .row-label { display: flex; flex-direction: column; gap: 2px; }
    .row-label span { font-size: 13px; font-weight: bold; color: #ffffff; }
    .row-label small { font-size: 11px; color: #6b7280; }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #3a3f4a;
      border-radius: 22px;
      transition: .3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 4px; bottom: 4px;
      background-color: white;
      border-radius: 50%;
      transition: .3s;
    }
    input:checked + .slider { background-color: #53fc18; }
    input:checked + .slider:before { transform: translateX(22px); }
    
    /* تصميم أزرار التصفير الفرعية الجديدة */
    .reset-sub-btn {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 12px;
      padding: 6px;
      background-color: #1e2330;
      color: #aeb2b9;
      border: 1px solid #3a3f4a;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      font-weight: bold;
      transition: .3s;
    }
    .reset-sub-btn:hover { 
      background-color: #ef4444; 
      color: white;
      border-color: #ef4444;
    }
    
    .divider {
      border-bottom: 1px solid #1e2330;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h3>إعدادات الأداة</h3>

  <div class="row">
    <div class="row-label">
      <span>عداد المشاهدات</span>
      <small id="viewersStatus">جاري التحميل...</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleViewers">
      <span class="slider"></span>
    </label>
  </div>
  <div class="divider"></div>

  <div class="row">
    <div class="row-label">
      <span>عداد الرسائل</span>
      <small id="chatStatus">جاري التحميل...</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleChat">
      <span class="slider"></span>
    </label>
  </div>
  <button id="resetChatBtn" class="reset-sub-btn">تصفير عداد الرسائل</button>
  <div class="divider"></div>

  <div class="row">
    <div class="row-label">
      <span>مؤقت الجلسة</span>
      <small id="timerStatus">جاري التحميل...</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleTimer">
      <span class="slider"></span>
    </label>
  </div>
  <button id="resetTimerBtn" class="reset-sub-btn">تصفير مؤقت الوقت</button>

  <script src="popup.js"></script>
</body>
</html>
